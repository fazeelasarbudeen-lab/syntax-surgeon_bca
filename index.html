
<!DOCTYPE html>
<html>
<head>
<title>Syntax Surgeon</title>
</head>

<body>

<h1>Syntax Surgeon AI Assistant</h1>

<form method="POST">
<textarea name="message" rows="6" cols="60"
placeholder="Enter Python code or question"></textarea>

<br><br>
<button type="submit">Analyze</button>
</form>

<h3>Syntax Result</h3>
<p>{{result}}</p>

<h3>Formatted Code</h3>
<pre>{{formatted}}</pre>

<h3>Assistant Response</h3>
<p>{{response}}</p>

</body>
</html>
